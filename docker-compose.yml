services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bookworm}
      POSTGRES_USER: ${POSTGRES_USER:-bookworm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "psql -U ${POSTGRES_USER:-bookworm} -d ${POSTGRES_DB:-bookworm} -c 'SELECT 1' -q --no-align --tuples-only"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  api:
    build: ./backend
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-bookworm}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-bookworm}
      GOOGLE_BOOKS_API_KEY: ${GOOGLE_BOOKS_API_KEY:-}
      RECAPTCHA_SITE_KEY: ${RECAPTCHA_SITE_KEY:-}
      RECAPTCHA_SECRET: ${RECAPTCHA_SECRET:-}
      RECAPTCHA_MIN_SCORE: ${RECAPTCHA_MIN_SCORE:-0.5}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8080}
      TRUST_PROXY: ${TRUST_PROXY:-1}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      COVERS_DIR: /app/data/covers
    volumes:
      - covers:/app/data/covers
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    environment:
      VITE_API_BASE: ${VITE_API_BASE:-/api}

volumes:
  pgdata:
  covers:
