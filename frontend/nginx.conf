server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Compress text responses (the JS bundle is ~420 kB uncompressed)
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # Baseline security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy same-origin always;

    location /api/ {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Digital Asset Links — must not redirect to index.html
    location /.well-known/ {
        try_files $uri =404;
    }

    # Vite emits content-hashed filenames — safe to cache forever.
    # (add_header here replaces the server-level set, which is fine for
    # static assets — they don't need the security headers.)
    location /assets/ {
        expires max;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
